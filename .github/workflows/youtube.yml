name: YouTube Ingest

on:
  repository_dispatch:
    types: [new-video]

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest script
        run: |
          python scripts/new_review.py ${{ github.event.client_payload.videoId }}

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "New video: ${{ github.event.client_payload.videoId }}" || echo "No changes"
          git push
